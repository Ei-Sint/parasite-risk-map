<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasture & Parasite Risk Map — Elanco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --panel:    #161b22;
    --border:   #21262d;
    --border2:  #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #1f6feb;
    --green:    #3fb950;
    --amber:    #d29922;
    --red:      #f85149;
    --green-bg: rgba(63,185,80,0.12);
    --amber-bg: rgba(210,153,34,0.12);
    --red-bg:   rgba(248,81,73,0.12);
    --elanco:   #005AA0;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo-text {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .season-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-transform: uppercase;
  }
  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  .live-dot::before {
    content: '';
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .btn-info {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-info:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* ── MAIN LAYOUT ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
  }
  .filter-select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font-body);
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }

  /* legend */
  .legend-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all 0.15s;
    flex: 1;
    justify-content: center;
  }
  .legend-item.active { border-color: var(--border2); background: var(--border); color: var(--text); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }

  /* farm list */
  .farm-list {
    overflow-y: auto;
    flex: 1;
  }
  .farm-list::-webkit-scrollbar { width: 4px; }
  .farm-list::-webkit-scrollbar-track { background: transparent; }
  .farm-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .farm-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .farm-item:hover { background: rgba(31,111,235,0.06); }
  .farm-item.selected { background: rgba(31,111,235,0.1); }
  .farm-item.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
  }
  .farm-risk-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .farm-item-info { flex: 1; min-width: 0; }
  .farm-item-name {
    font-size: 13px;
